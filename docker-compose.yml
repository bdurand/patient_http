services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "24455:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  s3mock:
    image: adobe/s3mock:latest
    ports:
      - "24456:9090"
      - "24457:9191"
    environment:
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: test-payloads
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/favicon.ico"]
      interval: 5s
      timeout: 3s
      retries: 5
