name: Continuous Integration

on:
  push:
    branches:
      - main
      - actions-*
    tags:
      - v*
  pull_request:
    branches-ignore:
      - actions-*

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:latest
        ports:
          - 24455:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      s3mock:
        image: adobe/s3mock:latest
        ports:
          - 24456:9090
        env:
          COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: test-payloads
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:9090/favicon.ico"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "ruby"
            yard: true
            standardrb: true
          - ruby: "ruby"
            appraisal: "without_payload_store_gems"
          - ruby: "4.0"
            appraisal: "activerecord_8.0"
          - ruby: "3.3"
            appraisal: "activerecord_7.2"
          - ruby: "4.0"
            appraisal: "redis_5"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Ruby CI
        uses: bdurand/github-actions/ruby-ci@v1.0.3
        with:
          ruby: ${{ matrix.ruby }}
          appraisal: ${{ matrix.appraisal }}
          bundler: ${{ matrix.bundler }}
          standardrb: ${{ matrix.standardrb }}
          yard: ${{ matrix.yard }}
          frozen_strings: ${{ matrix.frozen_strings }}
